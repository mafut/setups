DOCPATH_ROOT=${DOCPATH_ROOT:=}
DOCPATH_HTTP=${DOCPATH_HTTP:=/var/www/html}
DOCPATH_CONTENT=${DOCPATH_CONTENT:=}

ENABLE_HTTP=${ENABLE_HTTP:=true}
ENABLE_CONTENT=${ENABLE_CONTENT:=true}
ENABLE_VSCODE=${ENABLE_VSCODE:=true}

# MySQL
# https://dev.mysql.com/downloads/repo/apt/
MYSQL_REPO=${MYSQL_REPO:=mysql-apt-config_0.8.28-1_all.deb}
MYSQL_USER=${MYSQL_USER:=mysql}
MYSQL_LOG=${MYSQL_LOG:=/var/log/mysql}

# Nginx
NGINX_LOG=${NGINX_LOG:=/var/log/nginx}
NGINX_CERT_PATH=${NGINX_CERT_PATH:=}
NGINX_DEFAULT=${NGINX_DEFAULT:=false}

# Apache/PHP
APACHE_USER=${APACHE_USER:=www-data}
APACHE_LOG=${APACHE_LOG:=/var/log/apache2}
APACHE_PORT=${APACHE_PORT:=8081}

# Code-Server
# https://github.com/coder/code-server/releases
CODESERVER_VER=${CODESERVER_VER:=4.18.0}
CODESERVER_PASS=${CODESERVER_PASS:=}
CODESERVER_PORT=${CODESERVER_PORT:=8082}
CODESERVER_EXTS_DEFAULT=(
    # Bash IDE
    "mads-hartmann.bash-ide-vscode"
    # Better Comments
    "aaron-bond.better-comments"
    # Better Shell Syntax
    "jeff-hykin.better-shellscript-syntax"
    # Code Spell Checker
    "streetsidesoftware.code-spell-checker"
    # Dendron Markdown Shortcuts
    "dendron.dendron-markdown-shortcuts"
    # Explicit Folding
    "zokugun.explicit-folding"
    # Git Graph
    "mhutchie.git-graph"
    # Git History
    "donjayamanne.githistory"
    # Inline SQL
    "qufiwefefwoyn.inline-sql-syntax"
    # markdownlint
    "DavidAnson.vscode-markdownlint"
    # php cs fixer
    "junstyle.php-cs-fixer"
    # php inteliphense
    "bmewburn.vscode-intelephense-client"
    # Render line endings
    "medo64.render-crlf"
    # shell-format
    "foxundermoon.shell-format"
)
CODESERVER_EXTS=("${CODESERVER_EXTS:=${CODESERVER_EXTS_DEFAULT[@]}}")

#Others
ALLOWED_PORTS_DEFAULT=()
ALLOWED_PORTS=("${ALLOWED_PORTS:=${ALLOWED_PORTS_DEFAULT[@]}}")
