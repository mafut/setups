DOCPATH_ROOT=${DOCPATH_ROOT:=/var/www/html}
DOCPATH_HTTP=${DOCPATH_HTTP:=/var/www/html}
DOCPATH_STATIC=${DOCPATH_STATIC:=/var/www/html}

LOCATION_STATIC=${LOCATION_STATIC:=/content}
LOCATION_VSCODE=${LOCATION_VSCODE:=/vscode}

ENABLE_HTTP=${ENABLE_HTTP:=true}
ENABLE_STATIC=${ENABLE_STATIC:=true}
ENABLE_VSCODE=${ENABLE_VSCODE:=true}

# Logs
LOG_GROUP=${LOG_GROUP:=adm}
DIR_MYSQL_LOG=${DIR_MYSQL_LOG:=/var/log/mysql}
DIR_MYSQLDUMP_LOG=${DIR_MYSQLDUMP_LOG:=/var/log/mysqldump}
DIR_NGINX_LOG=${DIR_NGINX_LOG:=/var/log/nginx}
DIR_APACHE_LOG=${DIR_APACHE_LOG:=/var/log/apache2}

# SSMTP
SSMTP_HOST=${SSMTP_HOST:=smtp.gmail.com}
SSMTP_PORT=${SSMTP_PORT:=587}
SSMTP_TLS=${SSMTP_TLS:=YES}
SSMTP_STARTTLS=${SSMTP_STARTTLS:=YES}
SSMTP_ROOTUSER=${SSMTP_ROOTUSER:=}
SSMTP_ROOTDOMAIN=${SSMTP_ROOTDOMAIN:=}
SSMTP_AUTHUSER=${SSMTP_AUTHUSER:=}
SSMTP_AUTHPASS=${SSMTP_AUTHUSER:=}

# MySQL
# https://dev.mysql.com/downloads/repo/apt/
MYSQL_REPO=${MYSQL_REPO:=mysql-apt-config_0.8.28-1_all.deb}
MYSQL_USER=${MYSQL_USER:=mysql}
MYSQL_BACKUP_DB=${MYSQL_BACKUP_DB:=mysql}

# Nginx
NGINX_CERT_PATH=${NGINX_CERT_PATH:=}
NGINX_DEFAULT=${NGINX_DEFAULT:=false}

# Apache/PHP
APACHE_USER=${APACHE_USER:=www-data}
APACHE_PORT=${APACHE_PORT:=8081}
PHP_VER=${PHP_VER:=5.6}

# Code-Server
# https://github.com/coder/code-server/releases
CODESERVER_VER=${CODESERVER_VER:=4.23.1}
CODESERVER_PASS=${CODESERVER_PASS:=password}
CODESERVER_PORT=${CODESERVER_PORT:=8082}
if [ -z "${CODESERVER_EXTS}" ]; then
    CODESERVER_EXTS=(
        # Apache Conf
        "mrmlnc.vscode-apache"
        # Bash IDE
        "mads-hartmann.bash-ide-vscode"
        # Better Comments
        "aaron-bond.better-comments"
        # Better Shell Syntax
        "jeff-hykin.better-shellscript-syntax"
        # Code Spell Checker
        "streetsidesoftware.code-spell-checker"
        # Explicit Folding
        "zokugun.explicit-folding"
        # Format HTML in PHP
        "rifi2k.format-html-in-php"
        # Git Graph
        "mhutchie.git-graph"
        # Git History
        "donjayamanne.githistory"
        # indent-rainbow
        "oderwat.indent-rainbow"
        # Inline SQL
        "qufiwefefwoyn.inline-sql-syntax"
        # Markdown All in One
        "yzhang.markdown-all-in-one"
        # Markdown Shortcut
        "mdickin.markdown-shortcuts"
        # Markdown TOC and Chapter Numer
        "TakumiI.markdown-toc-num"
        # MySQL Syntax
        "jakebathman.mysql-syntax"
        # Path Autocomplete
        "ionutvmi.path-autocomplete"
        # php cs fixer
        "junstyle.php-cs-fixer"
        # Prettier
        "esbenp.prettier-vscode"
        # Project Manager
        "alefragnani.project-manager"
        # Render line endings
        "medo64.render-crlf"
        # shell-format
        "foxundermoon.shell-format"
        # Sort JSON Objects
        "richie5um2.vscode-sort-json"
        # Sort lines
        "Tyriar.sort-lines"
        # Toggle Terminal
        "krish-r.vscode-toggle-terminal"
        # vscode-icons
        "vscode-icons-team.vscode-icons"
        # vsnotes-todo
        "mafut.vsnotes-todo"
        # zenkaku
        "mosapride.zenkaku"
    )
fi

#Others
if [ -z "${ALLOWED_PORTS}" ]; then
    ALLOWED_PORTS=()
fi
if [ -z "${CRON_JOBS}" ]; then
    CRON_JOBS=(
        "*/5 * * * * /bin/sh -c 'cd ${DOCPATH_ROOT} && /usr/bin/git fetch --all && /usr/bin/git pull origin master && /usr/bin/git gc'"
        "*/5 * * * * /bin/sh -c 'cd ${DOCPATH_STATIC} && /usr/bin/git fetch --all && /usr/bin/git pull origin master && /usr/bin/git gc'"
    )
fi
